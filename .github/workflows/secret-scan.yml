name: Secret Scan

# Scans the full git history + working tree for committed secrets (API keys,
# tokens, credentials) on every push and PR. Config + allowlist: .gitleaks.toml

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so secrets in any commit are caught
      - name: Install gitleaks
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar -xzf gl.tgz gitleaks
          chmod +x gitleaks
      - name: Scan for secrets
        run: ./gitleaks detect --source . --redact --no-banner
