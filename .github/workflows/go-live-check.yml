name: Go-Live Readiness

on:
  schedule:
    - cron: "23 13 * * 1" # Mondays 13:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Go-live readiness checklist
        run: bun scripts/go-live-check.ts
