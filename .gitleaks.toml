# gitleaks config — extends the default ruleset, then allowlists known-safe values.
[extend]
useDefault = true

[allowlist]
description = "Public constants that are not secrets"
regexes = [
  # Azure Marketplace SaaS Fulfillment API public resource/audience GUID
  # (Microsoft-documented constant — used as the OAuth token resource, not a secret).
  '''20e940b3-4c77-4b0b-9a53-9e16a1b010a7''',
]
